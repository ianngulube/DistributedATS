[DEFAULT]
BeginString=FIX.4.4
ConnectionType=initiator
ReconnectInterval=30
FileStorePath=store
FileLogPath=log
StartTime=00:00:00
EndTime=00:00:00
ResetOnLogon=Y
ResetSeqNumFlag=Y
ResetOnDisconnect=Y

TargetCompID=FIX_GWY_1
