# If distributed_ats is instead running on the same host network and reachable from fix-ws-proxy via localhost,
# change this to 127.0.0.1.
SocketConnectHost=distributed_ats
SocketConnectPort=15001
HeartBtInt=30
DataDictionary=/usr/local/config/FIX44.xml
